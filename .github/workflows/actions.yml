# .github/workflows/actions.yml

# 이름 짓기
name: Github Actions로 테스트 자동화하기
on: push

jobs:
  push-job:
    runs-on: ubuntu-latest
    steps:
      - name: Github Repository 불러오기
        run: actions/checkout@v5
        with:
          node-version: "24"

      - name: 의존성(라이브러리) 설치
        run: npm ci

      - name: 테스트 실행하기
        run: npm run test
